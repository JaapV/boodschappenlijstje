<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boodschappen App v2</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #1c1e21; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; font-size: 1.2rem; margin-top: 25px; }
        
        /* Vinklijst */
        .vinklijst { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .vink-item { background: #f8f9fa; padding: 10px; border-radius: 12px; display: flex; align-items: center; font-size: 0.9rem; }
        .vink-item input { margin-right: 10px; width: 18px; height: 18px; }

        /* Knoppen */
        button { width: 100%; padding: 14px; margin-top: 8px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .btn-add { background: #007bff; color: white; }
        .btn-sort { background: #6c757d; color: white; margin-top: 20px; }
        .btn-reset { background: #dc3545; color: white; opacity: 0.8; }
        button:active { opacity: 0.7; transform: scale(0.98); }

        /* Input */
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; margin-top: 10px; font-size: 1rem; }

        /* Lijst */
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 12px; border-bottom: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; }
        .cat-badge { font-size: 0.75rem; background: #e9ecef; padding: 4px 10px; border-radius: 20px; color: #495057; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Vinklijst</h2>
    <div id="vinklijst-container" class="vinklijst"></div>
    <button class="btn-add" onclick="voegGeselecteerdeToe()">Voeg geselecteerde toe</button>

    <hr style="margin-top: 25px; border: 0; border-top: 1px solid #eee;">

    <input type="text" id="handmatig-input" placeholder="Ander product...">
    <button class="btn-add" style="background: #28a745;" onclick="voegHandmatigToe()">Handmatig toevoegen</button>

    <h2>Boodschappenlijst</h2>
    <ul id="boodschappenlijst"></ul>

    <button class="btn-sort" onclick="sorteerLijst()">Sorteer op looproute</button>
    <button class="btn-reset" onclick="resetLijst()">Lijst leegmaken</button>
</div>

<script>
    // --- DE DATA (JOUW TWEE TABELLEN) ---

    // Tabel 1: Producten en hun categorie
    const tabelProducten = [
        { product: 'Appels', categorie: 'Fruit' },
        { product: 'Bananen', categorie: 'Fruit' },
        { product: 'Brood', categorie: 'Bakker' },
        { product: 'Croissants', categorie: 'Bakker' },
        { product: 'Kaas', categorie: 'Zuivel' },
        { product: 'Melk', categorie: 'Zuivel' },
        { product: 'Eieren', categorie: 'Zuivel' },
        { product: 'Koffie', categorie: 'Voorraad' },
        { product: 'Wijn', categorie: 'Drank' },
        { product: 'Bier', categorie: 'Drank' }
    ];

    // Tabel 2: Categorieën en hun rank (volgorde in de winkel)
    const tabelCategorien = [
        { categorie: 'Fruit', rank: 1 },
        { categorie: 'Bakker', rank: 2 },
        { categorie: 'Zuivel', rank: 3 },
        { categorie: 'Voorraad', rank: 4 },
        { categorie: 'Drank', rank: 5 },
        { categorie: 'Overig', rank: 99 } // Voor handmatige items
    ];

    // --- LOGICA ---

    let huidigeLijst = JSON.parse(localStorage.getItem('mijnBoodschappen')) || [];

    // Hulpfunctie: zoek de rank op basis van de categorienaam
    function getRank(catNaam) {
        const cat = tabelCategorien.find(c => c.categorie === catNaam);
        return cat ? cat.rank : 99;
    }

    // Teken de vinklijst (Tabel 1)
    function tekenVinklijst() {
        const container = document.getElementById('vinklijst-container');
        tabelProducten.forEach(item => {
            const div = document.createElement('div');
            div.className = 'vink-item';
            div.innerHTML = `<input type="checkbox" value="${item.product}"> ${item.product}`;
            container.appendChild(div);
        });
    }

    // Voeg geselecteerde items toe
    function voegGeselecteerdeToe() {
        const checkboxes = document.querySelectorAll('#vinklijst-container input:checked');
        checkboxes.forEach(cb => {
            const productInfo = tabelProducten.find(p => p.product === cb.value);
            // Alleen toevoegen als het nog niet in de lijst staat
            if (!huidigeLijst.some(item => item.product === productInfo.product)) {
                huidigeLijst.push(productInfo);
            }
            cb.checked = false;
        });
        updateScherm();
    }

    // Handmatig toevoegen
    function voegHandmatigToe() {
        const input = document.getElementById('handmatig-input');
        const naam = input.value.trim();
        if (!naam) return;

        // Kijk of het product stiekem al in Tabel 1 staat
        const bekend = tabelProducten.find(p => p.product.toLowerCase() === naam.toLowerCase());
        
        if (bekend) {
            if (!huidigeLijst.some(item => item.product === bekend.product)) {
                huidigeLijst.push(bekend);
            }
        } else {
            // Anders: voeg toe met categorie 'Overig'
            huidigeLijst.push({ product: naam, categorie: 'Overig' });
        }
        
        input.value = "";
        updateScherm();
    }

    // SORTEREN op basis van Tabel 2 (rank)
    function sorteerLijst() {
        huidigeLijst.sort((a, b) => {
            return getRank(a.categorie) - getRank(b.categorie);
        });
        updateScherm();
    }

    // Reset
    function resetLijst() {
        if(confirm("Hele lijst wissen?")) {
            huidigeLijst = [];
            updateScherm();
        }
    }

    // UI Bijwerken
    function updateScherm() {
        const lijstUI = document.getElementById('boodschappenlijst');
        lijstUI.innerHTML = "";
        
        huidigeLijst.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${item.product}</span> <span class="cat-badge">${item.categorie}</span>`;
            lijstUI.appendChild(li);
        });

        localStorage.setItem('mijnBoodschappen', JSON.stringify(huidigeLijst));
    }

    // Init
    tekenVinklijst();
    updateScherm();

</script>

</body>
</html>
