<script>
    // --- CONFIGURATIE ---
    const firebaseConfig = {
        // ... (houd je eigen firebaseConfig hier!)
        apiKey: "AIzaSyCVT75f1r5oj2oQt_p8qPhFncQ4sF1Gl4I",
        authDomain: "boodschappen-website.firebaseapp.com",
        databaseURL: "https://boodschappen-website-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "boodschappen-website",
        storageBucket: "boodschappen-website.firebasestorage.app",
        messagingSenderId: "524178632267",
        appId: "1:524178632267:web:9ab9b7bcd72766ffc827ce"
    };

    const SPREADSHEET_ID = '2PACX-1vSccN8hUuZyA1taUz1e_FKsT7ZWwCMMhUKAGVRKYMxck2k-4z9MN9JFwZDEGvWRjDbIq19-Gglh80UV';
    // https://docs.google.com/spreadsheets/d/1e9EiFl4qvpOmyrUcmbSVX_5q2A2i1LUxJkpBvGDtZgc

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tabelProducten = [];
    let tabelCategorien = [];
    let huidigeLijst = [];
    let selectieStatus = {};

    // --- DATA LADEN UIT GOOGLE SHEETS ---
    async function laadData() {
        const urlProducten = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Producten`;
        const urlCategorien = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Categorien`;

        try {
            const [resP, resC] = await Promise.all([fetch(urlProducten), fetch(urlCategorien)]);
            const csvP = await resP.text();
            const csvC = await resC.text();

            tabelProducten = csvNaarObject(csvP);
            tabelCategorien = csvNaarObject(csvC);

            // Initialiseer selectieStatus
            tabelProducten.forEach(p => selectieStatus[p.product] = 0);
            
            tekenVinklijst();
            console.log("Data succesvol geladen uit Sheets!");
        } catch (e) {
            console.error("Fout bij laden Sheets:", e);
        }
    }

    // Hulpfunctie om CSV tekst om te zetten naar een lijst met objecten
    function csvNaarObject(csv) {
        const lijnen = csv.split('\n');
        const titels = lijnen[0].replace(/"/g, '').split(',');
        return lijnen.slice(1).map(lijn => {
            const waarden = lijn.replace(/"/g, '').split(',');
            let obj = {};
            titels.forEach((titel, i) => obj[titel.trim()] = waarden[i]?.trim());
            return obj;
        });
    }

    // --- DE REST VAN JE LOGICA (Firebase sync & tekenen) ---
    db.ref('boodschappen').on('value', (snapshot) => {
        const data = snapshot.val();
        huidigeLijst = data ? Object.entries(data).map(([key, val]) => ({...val, id: key})) : [];
        tekenBoodschappenlijst();
    });

    function tekenVinklijst() {
        const container = document.getElementById('vinklijst-container');
        container.innerHTML = "";
        tabelProducten.forEach(item => {
            const div = document.createElement('div');
            div.className = 'vink-item';
            div.innerHTML = `
                <span>${item.product}</span>
                <div class="controls">
                    <div class="btn-qty" onclick="pasAantalAan('${item.product}', -1)">-</div>
                    <span class="qty-val" id="qty-${item.product}">${selectieStatus[item.product] || 0}</span>
                    <div class="btn-qty" onclick="pasAantalAan('${item.product}', 1)">+</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function pasAantalAan(product, delta) {
        let nieuwAantal = (selectieStatus[product] || 0) + delta;
        if (nieuwAantal < 0) nieuwAantal = 0;
        selectieStatus[product] = nieuwAantal;
        document.getElementById(`qty-${product}`).innerText = nieuwAantal;
    }

    async function voegGeselecteerdeToe() {
        for (const product of tabelProducten) {
            const aantalToevoegen = selectieStatus[product.product];
            if (aantalToevoegen > 0) {
                const bestaandItem = huidigeLijst.find(i => i.product === product.product);
                if (bestaandItem) {
                    db.ref('boodschappen/' + bestaandItem.id).update({ aantal: parseInt(bestaandItem.aantal) + aantalToevoegen });
                } else {
                    db.ref('boodschappen').push({
                        product: product.product,
                        categorie: product.categorie,
                        aantal: aantalToevoegen
                    });
                }
            }
            selectieStatus[product.product] = 0;
        }
        tekenVinklijst();
    }

    function voegHandmatigToe() {
        const input = document.getElementById('handmatig-input');
        const naam = input.value.trim();
        if (!naam) return;
        db.ref('boodschappen').push({ product: naam, categorie: 'Overig', aantal: 1 });
        input.value = "";
    }

    function sorteerLijst() {
        huidigeLijst.sort((a, b) => {
            const catA = tabelCategorien.find(c => c.categorie === a.categorie) || {rank: 99};
            const catB = tabelCategorien.find(c => c.categorie === b.categorie) || {rank: 99};
            return parseInt(catA.rank) - parseInt(catB.rank);
        });
        const gesorteerdObject = {};
        huidigeLijst.forEach((item, index) => {
            gesorteerdObject[index] = { product: item.product, categorie: item.categorie, aantal: item.aantal };
        });
        db.ref('boodschappen').set(gesorteerdObject);
    }

    function resetLijst() {
        if(confirm("Lijst legen voor iedereen?")) db.ref('boodschappen').remove();
    }

    function tekenBoodschappenlijst() {
        const lijstUI = document.getElementById('boodschappenlijst');
        lijstUI.innerHTML = "";
        huidigeLijst.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-info">
                    <span class="aantal-badge">${item.aantal}x</span>
                    <span>${item.product}</span>
                </div>
                <span class="cat-badge">${item.categorie}</span>
            `;
            lijstUI.appendChild(li);
        });
    }

    // Start: laad eerst de data uit Google Sheets
    laadData();
</script>
