<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boodschappenlijst Jaap en Ilse</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #1c1e21; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; font-size: 1.1rem; margin-top: 20px; color: #4b4b4b; }
        
        /* Product Kiezer */
        .vinklijst { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .vink-item { background: #f8f9fa; padding: 10px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .controls { display: flex; align-items: center; gap: 12px; }
        .btn-qty { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; background: white; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .qty-val { font-weight: bold; min-width: 20px; text-align: center; color: #007bff; }

        /* Knoppen */
        button { width: 100%; padding: 14px; margin-top: 8px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-add { background: #007bff; color: white; }
        .btn-sort { background: #6c757d; color: white; margin-top: 20px; }
        .btn-reset { background: #dc3545; color: white; opacity: 0.8; margin-top: 10px; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; margin-top: 10px; font-size: 1rem; }

        /* Boodschappenlijst */
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 12px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: center; justify-content: space-between; }
        .item-main { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; }
        .done { text-decoration: line-through; opacity: 0.4; }
        .aantal-badge { background: #e7f1ff; color: #007bff; padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .cat-badge { font-size: 0.7rem; background: #f0f0f0; padding: 3px 8px; border-radius: 15px; color: #777; font-weight: bold; margin-left: auto; margin-right: 10px; }
        .btn-del { color: #ccc; padding: 5px 10px; font-size: 1.1rem; cursor: pointer; }

        #loading-status { background: #fff3cd; color: #856404; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; font-size: 0.9rem; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-status">Gegevens ophalen uit Google Sheets...</div>

    <h2>Kies producten</h2>
    <div id="vinklijst-container" class="vinklijst"></div>
    <button class="btn-add" onclick="voegGeselecteerdeToe()">Zet op de lijst</button>

    <input type="text" id="handmatig-input" placeholder="Iets anders...">
    <button class="btn-add" style="background: #28a745;" onclick="voegHandmatigToe()">Handmatig toevoegen</button>

    <h2>Onze Boodschappenlijst</h2>
    <ul id="boodschappenlijst"></ul>

    <button class="btn-sort" onclick="sorteerLijst()">Sorteer op looproute</button>
    <button class="btn-reset" onclick="resetLijst()">Lijst legen</button>
</div>

<script>
    // --- CONFIGURATIE ---
    const firebaseConfig = {
      apiKey: "AIzaSyCVT75f1r5oj2oQt_p8qPhFncQ4sF1Gl4I",
      authDomain: "boodschappen-website.firebaseapp.com",
      databaseURL: "https://boodschappen-website-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "boodschappen-website",
      storageBucket: "boodschappen-website.firebasestorage.app",
      messagingSenderId: "524178632267",
      appId: "1:524178632267:web:9ab9b7bcd72766ffc827ce"
    };

    const SPREADSHEET_ID = '1e9EiFl4qvpOmyrUcmbSVX_5q2A2i1LUxJkpBvGDtZgc';

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tabelProducten = [];
    let tabelCategorien = [];
    let huidigeLijst = [];
    let selectieStatus = {};

    // --- DATA OPHALEN ---
    async function laadData() {
        const statusDiv = document.getElementById('loading-status');
        const urlProducten = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Producten`;
        const urlCategorien = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Categorien`;

        try {
            const [resP, resC] = await Promise.all([fetch(urlProducten), fetch(urlCategorien)]);
            const csvP = await resP.text();
            const csvC = await resC.text();

            tabelProducten = csvNaarObject(csvP);
            tabelCategorien = csvNaarObject(csvC);

            tabelProducten.forEach(p => selectieStatus[p.product] = 0);
            tekenVinklijst();
            statusDiv.style.display = 'none';
        } catch (e) {
            statusDiv.innerHTML = "⚠️ Fout bij laden Sheets. Check of de tabbladen 'Producten' en 'Categorien' heten.";
            statusDiv.style.background = "#f8d7da";
        }
    }

    function csvNaarObject(csv) {
        const lijnen = csv.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (lijnen.length < 2) return [];
        const header = lijnen[0].replace(/"/g, '');
        const sep = header.includes(';') ? ';' : ',';
        const titels = header.split(sep).map(t => t.trim().toLowerCase());

        return lijnen.slice(1).map(lijn => {
            const waarden = lijn.replace(/"/g, '').split(sep);
            let obj = {};
            titels.forEach((titel, i) => obj[titel] = waarden[i] ? waarden[i].trim() : "");
            return obj;
        });
    }

    // --- FIREBASE SYNC ---
    db.ref('boodschappen').on('value', (snapshot) => {
        const data = snapshot.val();
        huidigeLijst = data ? Object.entries(data).map(([key, val]) => ({...val, id: key})) : [];
        tekenBoodschappenlijst();
    });

    function tekenVinklijst() {
        const container = document.getElementById('vinklijst-container');
        container.innerHTML = "";
        tabelProducten.forEach(item => {
            if(!item.product) return;
            const div = document.createElement('div');
            div.className = 'vink-item';
            div.innerHTML = `
                <span>${item.product}</span>
                <div class="controls">
                    <div class="btn-qty" onclick="pasAantalAan('${item.product}', -1)">-</div>
                    <span class="qty-val" id="qty-${item.product}">${selectieStatus[item.product] || 0}</span>
                    <div class="btn-qty" onclick="pasAantalAan('${item.product}', 1)">+</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function pasAantalAan(p, d) {
        selectieStatus[p] = Math.max(0, (selectieStatus[p] || 0) + d);
        document.getElementById(`qty-${p}`).innerText = selectieStatus[p];
    }

    async function voegGeselecteerdeToe() {
        for (const p of tabelProducten) {
            const aantal = selectieStatus[p.product];
            if (aantal > 0) {
                const bestaand = huidigeLijst.find(i => i.product === p.product);
                if (bestaand) {
                    await db.ref('boodschappen/' + bestaand.id).update({ aantal: parseInt(bestaand.aantal) + aantal, done: false });
                } else {
                    await db.ref('boodschappen').push({ product: p.product, categorie: p.categorie, aantal: aantal, done: false });
                }
            }
            selectieStatus[p.product] = 0;
        }
        tekenVinklijst();
    }

    function voegHandmatigToe() {
        const input = document.getElementById('handmatig-input');
        const naam = input.value.trim();
        if (!naam) return;
        db.ref('boodschappen').push({ product: naam, categorie: 'Overig', aantal: 1, done: false });
        input.value = "";
    }

    function toggleDone(id, currentStatus) {
        db.ref('boodschappen/' + id).update({ done: !currentStatus });
    }

    function verwijderItem(id) {
        db.ref('boodschappen/' + id).remove();
    }

    function sorteerLijst() {
        huidigeLijst.sort((a, b) => {
            const rankA = (tabelCategorien.find(c => c.categorie.toLowerCase() === a.categorie.toLowerCase()) || {rank: 99}).rank;
            const rankB = (tabelCategorien.find(c => c.categorie.toLowerCase() === b.categorie.toLowerCase()) || {rank: 99}).rank;
            return parseInt(rankA) - parseInt(rankB);
        });
        const obj = {};
        huidigeLijst.forEach((item, i) => obj[i] = { product: item.product, categorie: item.categorie, aantal: item.aantal, done: item.done || false });
        db.ref('boodschappen').set(obj);
    }

    function resetLijst() {
        if(confirm("Lijst helemaal legen?")) db.ref('boodschappen').remove();
    }

    function tekenBoodschappenlijst() {
        const lijstUI = document.getElementById('boodschappenlijst');
        lijstUI.innerHTML = "";
        huidigeLijst.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-main ${item.done ? 'done' : ''}" onclick="toggleDone('${item.id}', ${item.done})">
                    <span class="aantal-badge">${item.aantal}x</span>
                    <span>${item.product}</span>
                </div>
                <span class="cat-badge">${item.categorie}</span>
                <div class="btn-del" onclick="verwijderItem('${item.id}')">✕</div>
            `;
            lijstUI.appendChild(li);
        });
    }

    laadData();
</script>
</body>
</html>
