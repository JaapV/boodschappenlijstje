<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boodschappenlijst Jaap en Ilse</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #1c1e21; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; font-size: 1.1rem; margin-top: 20px; }
        .input-sectie { background: #e7f1ff; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #007bff; border-radius: 12px; font-size: 1.1rem; outline: none; }
        .btn-add { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 12px; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 12px 0; border-bottom: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .item-info { display: flex; align-items: center; gap: 8px; flex: 1; cursor: pointer; }
        .aantal-badge { background: #007bff; color: white; padding: 2px 6px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; flex-shrink: 0; }
        .cat-badge { font-size: 0.65rem; background: #e9ecef; color: #495057; padding: 3px 8px; border-radius: 20px; font-weight: bold; white-space: nowrap; }
        .vinkje-icon { color: #28a745; font-weight: bold; margin-left: 5px; }
        .item-actions { display: flex; gap: 5px; flex-shrink: 0; }
        .item-actions button { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd; background: white; cursor: pointer; padding: 0; }
        .btn-reset { width: 100%; padding: 12px; margin-top: 20px; border: none; border-radius: 12px; background: #dc3545; color: white; font-weight: bold; opacity: 0.8; }
        #loading-overlay { display: none; text-align: center; font-size: 0.8rem; color: #007bff; margin-top: 8px; font-style: italic; }
        #error-log { display: none; background: #ffe3e3; color: #b71c1c; padding: 10px; border-radius: 10px; font-size: 0.75rem; margin-top: 10px; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>

<div class="container">
    <div class="input-sectie">
        <input type="text" id="product-input" placeholder="Wat hebben we nodig?">
        <div id="loading-overlay">🤖 AI bepaalt categorie...</div>
        <div id="error-log"></div>
        <button class="btn-add" onclick="productToevoegen()">Voeg toe</button>
    </div>

    <h2>Boodschappenlijst</h2>
    <ul id="boodschappenlijst"></ul>
    <button class="btn-reset" onclick="resetLijst()">Lijst legen</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVT75f1r5oj2oQt_p8qPhFncQ4sF1Gl4I",
      authDomain: "boodschappen-website.firebaseapp.com",
      databaseURL: "https://boodschappen-website-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "boodschappen-website",
      storageBucket: "boodschappen-website.firebasestorage.app",
      messagingSenderId: "524178632267",
      appId: "1:524178632267:web:9ab9b7bcd72766ffc827ce"
    };

    // Je nieuwe key
    const AI_API_KEY = "AIzaSyCtkKlYncy13gCtAS9KH9Ic6HyqszAB_HA".trim(); 

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tabelCategorien = [];
    let huidigeLijst = [];

    async function laadCategorien() {
        try {
            const v = new Date().getTime();
            const res = await fetch(`categorien.csv?v=${v}`);
            const text = await res.text();
            tabelCategorien = parseCsv(text);
        } catch (e) { showError("Fout bij laden categorien.csv."); }
    }

    function parseCsv(text) {
        const lines = text.replace(/\r/g, '').trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        return lines.slice(1).map(line => {
            const values = line.split(',').map(v => v.trim());
            let obj = {};
            headers.forEach((h,i) => obj[h] = values[i]);
            return obj;
        });
    }

    async function bepaalCategorieMetAI(productNaam) {
        if (tabelCategorien.length === 0) return "Overig";
        const categorieNamen = tabelCategorien.map(c => c.categorie).join(', ');
        const prompt = `Categoriseer het product "${productNaam}" in één van deze groepen: ${categorieNamen}. Antwoord alleen met de exacte naam van de groep. Als het niet in de lijst staat, antwoord dan: Overig.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text.trim().replace(/[^\w\s]/gi, '');
        } catch (e) {
            showError("AI Fout: " + e.message);
            return "Overig";
        }
    }

    async function productToevoegen() {
        const input = document.getElementById('product-input');
        const product = input.value.trim();
        if (!product) return;
        document.getElementById('loading-overlay').style.display = 'block';
        document.getElementById('error-log').style.display = 'none';

        const categorie = await bepaalCategorieMetAI(product);
        const bestaand = huidigeLijst.find(i => i.product.toLowerCase() === product.toLowerCase());
        
        if (bestaand) {
            await db.ref(`boodschappen/${bestaand.id}`).update({ aantal: bestaand.aantal + 1, vinkje: false });
        } else {
            await db.ref('boodschappen').push({ product, categorie, aantal: 1, vinkje: false });
        }
        input.value = "";
        document.getElementById('loading-overlay').style.display = 'none';
        input.blur(); // Toetsenbord inklappen
    }

    db.ref('boodschappen').on('value', (snapshot) => {
        const data = snapshot.val();
        huidigeLijst = data ? Object.entries(data).map(([id, val]) => ({...val, id})) : [];
        huidigeLijst.sort((a,b) => {
            const catA = tabelCategorien.find(c => c.categorie.toLowerCase() === a.categorie.toLowerCase());
            const catB = tabelCategorien.find(c => c.categorie.toLowerCase() === b.categorie.toLowerCase());
            const rankA = catA ? parseInt(catA.rank) : 99;
            const rankB = catB ? parseInt(catB.rank) : 99;
            return rankA !== rankB ? rankA - rankB : a.product.localeCompare(b.product);
        });
        tekenBoodschappenlijst();
    });

    function tekenBoodschappenlijst() {
        const lijst = document.getElementById('boodschappenlijst');
        lijst.innerHTML = "";
        huidigeLijst.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-info" onclick="toggleVinkje('${item.id}', ${item.vinkje})">
                    <span class="aantal-badge">${item.aantal}x</span>
                    <span>${item.product}</span>
                    ${item.vinkje ? '<span class="vinkje-icon">✓</span>' : ''}
                    <span class="cat-badge">${item.categorie}</span>
                </div>
                <div class="item-actions">
                    <button onclick="pasAantal('${item.id}', -1)">-</button>
                    <button onclick="pasAantal('${item.id}', +1)">+</button>
                </div>
            `;
            lijst.appendChild(li);
        });
    }

    function pasAantal(id, d) {
        const item = huidigeLijst.find(i => i.id === id);
        const nieuw = item.aantal + d;
        if (nieuw <= 0) db.ref(`boodschappen/${id}`).remove();
        else db.ref(`boodschappen/${id}`).update({ aantal: nieuw });
    }

    function toggleVinkje(id, s) { db.ref(`boodschappen/${id}`).update({ vinkje: !s }); }
    function resetLijst() { if (confirm("Hele lijst wissen?")) db.ref('boodschappen').remove(); }
    function showError(msg) {
        const log = document.getElementById('error-log');
        log.innerHTML = `<b>Foutmelding:</b> ${msg}`;
        log.style.display = 'block';
    }

    laadCategorien();
</script>
</body>
</html>
