    async function laadCategorien() {
        try {
            const v = new Date().getTime();
            const res = await fetch(`categorien.csv?v=${v}`);
            const text = await res.text();
            tabelCategorien = parseCsv(text);
        } catch (e) { showError("Fout bij laden categorien.csv."); }
    }

    function parseCsv(text) {
        const lines = text.replace(/\r/g, '').trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        return lines.slice(1).map(line => {
            const values = line.split(',').map(v => v.trim());
            let obj = {};
            headers.forEach((h,i) => obj[h] = values[i]);
            return obj;
        });
    }

    async function bepaalCategorieMetAI(productNaam) {
        if (tabelCategorien.length === 0) return "Overig";
        const categorieNamen = tabelCategorien.map(c => c.categorie).join(', ');
        const prompt = `Categoriseer het product "${productNaam}" in één van deze groepen: ${categorieNamen}. Antwoord alleen met de exacte naam van de groep. Als het niet in de lijst staat, antwoord dan: Overig.`;

        try {
            // GEFIXTE URL: Gebruik v1 in plaats van v1beta
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${AI_API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);
            
            let result = data.candidates[0].content.parts[0].text.trim().replace(/[^\w\s]/gi, '');
            return result;
        } catch (e) {
            showError("AI Fout: " + e.message);
            return "Overig";
        }
    }
