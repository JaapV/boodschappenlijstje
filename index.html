<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onze App</title>
    
    <style>
        /* Dit is de CSS: de 'styling' van je app */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5; /* Een zachte achtergrondkleur */
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #ff4757; /* Een mooie rode kleur */
            margin: 0;
        }

        p {
            color: #57606f;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello World! 🚀</h1>
        <p>Welkom bij onze eerste eigen app.</p>
    </div>

</body>
</html>
