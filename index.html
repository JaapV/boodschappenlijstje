<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Diagnose - Boodschappen</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        .box { background: #f0f2f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 10px; }
        #log { background: #ffe3e3; color: #b71c1c; padding: 10px; border-radius: 10px; font-size: 0.8rem; white-space: pre-wrap; display: none; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Stap 1: Diagnose</h3>
        <p>Klik op de knop hieronder om te zien welke AI-modellen Google toestaat voor jouw key.</p>
        <button onclick="checkModellen()">Check beschikbare AI-modellen</button>
        <div id="log"></div>
    </div>

    <script>
        const AI_API_KEY = "AIzaSyCtkKlYncy13gCtAS9KH9Ic6HyqszAB_HA";

        async function checkModellen() {
            const logDiv = document.getElementById('log');
            logDiv.style.display = 'block';
            logDiv.innerText = "Bezig met ophalen van lijst...";

            try {
                // We proberen de ListModels call
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${AI_API_KEY}`);
                const data = await response.json();

                if (data.error) {
                    logDiv.innerText = "FOUT: " + data.error.message;
                } else {
                    // We filteren alleen de namen eruit voor de duidelijkheid
                    const modellen = data.models.map(m => m.name).join('\n');
                    logDiv.innerText = "GELUKT! Je mag deze namen gebruiken:\n\n" + modellen;
                    logDiv.style.background = "#e7f1ff";
                    logDiv.style.color = "#004085";
                }
            } catch (e) {
                logDiv.innerText = "VERBINDINGSFOUT: " + e.message;
            }
        }
    </script>
</body>
</html>
